<!DOCTYPE html>
<html>
<head>

<title>Sales Prediction</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Business Sales Prediction</h1>

<form action="/predict" method="post">

<input type="number" name="advertising" placeholder="Advertising Budget" required>

<input type="number" name="price" placeholder="Product Price" required>

<input type="number" name="discount" placeholder="Discount (%)" required>

<input type="number" name="season" placeholder="Season (1-4)" required>

<button type="submit">Predict Sales</button>

</form>

<h2>{{ prediction_text }}</h2>

</div>

</body>
</html>
